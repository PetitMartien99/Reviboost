<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mind Elixir Demo</title>

  <!-- CSS Mind Elixir -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-elixir/dist/style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #map {
      height: 500px;
      width: 500px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <button id="exportBtn">Log JSON</button>
  </div>

  <div id="map"></div>

  <script type="module">
    import MindElixir from 'mind-elixir';
  
    
    let mind = new MindElixir({
    el: '#map',
    direction: MindElixir.LEFT,
    // or set as data that is return from `.getAllData()`
    // data: {...},
    draggable: true, // default true
    contextMenu: true, // default true
    toolBar: true, // default true
    nodeMenu: true, // default true
    keypress: true, // default true
  })
  mind.init(MindElixir.new('new topic'))
  
    document.getElementById('exportBtn').onclick = () => {
      console.log(JSON.stringify(mind.getData(), null, 2));
    };
  </script>

</body>
</html>
