<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Trumbowyg</title>

  <!-- jQuery (obligatoire pour Trumbowyg) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Trumbowyg -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/trumbowyg@2.28.0/dist/ui/trumbowyg.min.css">
  <script src="https://cdn.jsdelivr.net/npm/trumbowyg@2.28.0/dist/trumbowyg.min.js"></script>

  <!-- Plugins couleurs -->
  <script src="https://cdn.jsdelivr.net/npm/trumbowyg@2.28.0/dist/plugins/colors/trumbowyg.colors.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/trumbowyg@2.28.0/dist/plugins/colors/ui/trumbowyg.colors.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    #editor {
      min-height: 200px;
    }

    button {
      cursor: pointer;
    }

  </style>
</head>
<body>

  <h2>Éditeur Trumbowyg</h2>

  <!-- Zone éditable -->
  <div id="editor"></div>

  <button id="logBtn">Afficher contenu</button>

  <script>
    // Init éditeur
    $('#editor').trumbowyg({
      btns: [
        ['formatting'],
        ['bold', 'italic', 'underline'],
        ['foreColor', 'backColor'],
        ['unorderedList', 'orderedList'],
        ['removeformat']
      ]
    });

    // Log contenu
    document.getElementById('logBtn').addEventListener('click', () => {
      const html = $('#editor').trumbowyg('html');
      $('#editor').trumbowyg('html', "stuff");
      $('#editor').trumbowyg('html', html);
      console.log("HTML :", html);
    });
  </script>

</body>
</html>
